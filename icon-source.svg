<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0b35a"/>
      <stop offset="50%" stop-color="#c9984a"/>
      <stop offset="100%" stop-color="#a87c38"/>
    </linearGradient>
  </defs>

  <!-- Gold background edge to edge -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- W in dark red -->
  <text
    x="134" y="345"
    font-family="'Arial Black','Arial Bold',sans-serif"
    font-weight="900"
    font-size="238"
    fill="#8B2635"
    text-anchor="middle">W</text>

  <!-- F in dark maroon -->
  <text
    x="372" y="345"
    font-family="'Arial Black','Arial Bold',sans-serif"
    font-weight="900"
    font-size="238"
    fill="#1a0a0f"
    text-anchor="middle">F</text>
</svg>
