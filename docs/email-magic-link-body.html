<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HimFit</title>
</head>
<body style="margin:0;padding:0;background-color:#14080c;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#14080c;padding:32px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background-color:#1a0a0f;border:1px solid #5c4033;border-radius:14px;">
          <tr>
            <td style="padding:36px 28px 24px;text-align:center;font-family:Georgia,'Times New Roman',serif;">
              <p style="margin:0 0 10px;font-size:10px;letter-spacing:0.4em;text-transform:uppercase;color:#9a9590;">HimFit</p>
              <h1 style="margin:0;font-size:34px;line-height:1.1;font-weight:400;color:#f0eeeb;">Your journey<br><span style="color:#c9984a;">awaits</span></h1>
              <p style="margin:20px 0 0;font-size:15px;line-height:1.65;color:#c4bfb8;font-weight:300;">A single, discreet link — no password. Tap the button to open HimFit, signed in.</p>
            </td>
          </tr>
          <tr>
            <td style="padding:0 28px 28px;text-align:center;">
              <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 32px;background-color:#2d1f18;border:1px solid #c9984a;border-radius:8px;color:#f0eeeb;text-decoration:none;font-size:10px;letter-spacing:0.3em;text-transform:uppercase;font-family:Arial,Helvetica,sans-serif;">Enter HimFit</a>
            </td>
          </tr>
          <tr>
            <td style="padding:0 28px 32px;text-align:center;font-family:Arial,Helvetica,sans-serif;">
              <p style="margin:0;font-size:12px;line-height:1.6;color:#7a756e;">If you didn’t request this, you can ignore this email.</p>
              <p style="margin:14px 0 0;font-size:11px;line-height:1.5;color:#6a6560;">Sent to: {{ .Email }}</p>
              <p style="margin:14px 0 0;font-size:11px;line-height:1.5;color:#6a6560;">Questions: <a href="mailto:info@williamacampbell.com" style="color:#c9984a;text-decoration:none;">info@williamacampbell.com</a></p>
            </td>
          </tr>
        </table>
        <p style="margin:24px 0 0;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:#4a4540;font-family:Arial,Helvetica,sans-serif;">Twelve weeks · strength · half marathon build</p>
      </td>
    </tr>
  </table>
</body>
</html>
